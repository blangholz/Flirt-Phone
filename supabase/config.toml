# Supabase config for FlirtPhone.
# Update site_url + additional_redirect_urls to match your Vercel deployment
# before running `supabase config push` in Milestone 1's deploy step.

project_id = "flirtphone"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Update these to match your deployment after first Vercel deploy.
site_url = "https://project-qmhiq.vercel.app"
additional_redirect_urls = [
  "https://project-qmhiq.vercel.app",
  "https://project-qmhiq.vercel.app/",
  "http://localhost:3000",
  "http://127.0.0.1:3000",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.rate_limit]
email_sent = 100
sign_in_sign_ups = 30
token_verifications = 30
token_refresh = 150

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

# Custom magic-link template — uses ?token_hash=... so email-scanner
# prefetches don't burn the single-use token before the real click.
[auth.email.template.magic_link]
subject = "Your FlirtPhone sign-in link"
content_path = "./supabase/templates/magic_link.html"

# SMTP via Resend (optional). Uncomment + add RESEND_API_KEY if Supabase's
# built-in email throttling becomes an issue at scale.
# [auth.email.smtp]
# enabled = true
# host = "smtp.resend.com"
# port = 465
# user = "resend"
# pass = "env(RESEND_API_KEY)"
# admin_email = "auth@CHANGE_ME.com"
# sender_name = "FlirtPhone"

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2
